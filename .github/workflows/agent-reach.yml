name: YouTube Search with PO Token
on:
  workflow_dispatch:
    inputs:
      query:
        description: 'كلمة البحث'
        required: true
        default: 'تعلم بايثون'
      limit:
        description: 'عدد النتائج'
        required: false
        default: '5'

jobs:
  search:
    runs-on: ubuntu-latest

    services:
      pot-provider:
        image: brainicism/bgutil-ytdlp-pot-provider:latest
        ports:
          - 4416:4416

    steps:
      - name: تثبيت الأدوات الأساسية
        run: |
          sudo apt update
          sudo apt install -y python3 python3-pip ffmpeg curl jq unzip

      - name: تثبيت yt-dlp مع PO Token Provider
        run: |
          pip install -U yt-dlp
          curl -L -o bgutil-plugin.zip \
            https://github.com/Brainicism/bgutil-ytdlp-pot-provider/releases/latest/download/bgutil-ytdlp-pot-provider.zip
          mkdir -p ~/.config/yt-dlp/plugins
          unzip -o bgutil-plugin.zip -d ~/.config/yt-dlp/plugins/

      - name: انتظار جاهزية خادم التوكن
        run: |
          echo "⏳ بانتظار تشغيل الخادم..."
          sleep 10

      - name: البحث وجلب النتائج
        run: |
          yt-dlp "ytsearch${{ github.event.inputs.limit }}:${{ github.event.inputs.query }}" \
            --skip-download \
            --pot-provider http://localhost:4416 \
            --extractor-args "youtube:player-client=android" \
            --print "%(title)s | %(uploader)s | %(view_count)s" \
            --no-warnings \
            --quiet > results.txt

      - name: رفع النتائج
        uses: actions/upload-artifact@v4
        with:
          name: youtube-results
          path: results.txt
