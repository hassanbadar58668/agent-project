name: Agent Reach Test
on:
  workflow_dispatch:
    inputs:
      query:
        description: 'Search query'
        required: true
        default: 'AI news'

jobs:
  search:
    runs-on: ubuntu-latest
    steps:
      - name: Install Python and tools
        run: |
          sudo apt update
          sudo apt install -y python3 python3-pip git

      - name: Install Agent-Reach from GitHub
        run: |
          pip install https://github.com/Panniantong/agent-reach/archive/main.zip

      - name: Setup Agent-Reach environment
        run: |
          agent-reach install --env=auto

      - name: Run search
        run: |
          agent-reach doctor
