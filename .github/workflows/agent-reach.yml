name: Agent Reach Test
on:
  workflow_dispatch:
    inputs:
      query:
        description: 'Search query'
        required: true
        default: 'AI news'

jobs:
  search:
    runs-on: ubuntu-latest
    steps:
      - name: Install Node.js and tools
        run: |
          sudo apt update
          sudo apt install -y nodejs npm git

      - name: Clone Agent-Reach
        run: |
          git clone https://github.com/Panniantong/Agent-Reach.git
          cd Agent-Reach
          npm install

      - name: Run search
        run: |
          cd Agent-Reach
          node index.js search "${{ github.event.inputs.query }}"
