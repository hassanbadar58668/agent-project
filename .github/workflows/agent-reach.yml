name: Agent Reach Test
on:
  workflow_dispatch:
    inputs:
      query:
        description: 'أمر البحث الكامل (مثل: bili search "تعلم بايثون")'
        required: true
        default: 'agent-reach --help'

jobs:
  search:
    runs-on: ubuntu-latest
    steps:
      - name: Install tools
        run: |
          sudo apt update
          sudo apt install -y python3 python3-pip git curl
          pip install https://github.com/Panniantong/agent-reach/archive/main.zip
          agent-reach install --env=auto

      - name: Execute command
        run: |
          echo "تنفيذ: ${{ github.event.inputs.query }}"
          echo "==================== النتائج ===================="
          eval "${{ github.event.inputs.query }}" | tee results.txt

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: results
          path: results.txt
