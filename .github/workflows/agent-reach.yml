name: Agent Reach Test
on:
  workflow_dispatch:
    inputs:
      query:
        description: 'أمر البحث الكامل (مثل: bili search "تعلم بايثون")'
        required: true
        default: 'bili search "AI" --type video -n 3'

jobs:
  search:
    runs-on: ubuntu-latest
    steps:
      - name: Install tools
        run: |
          sudo apt update
          sudo apt install -y python3 python3-pip git curl
          pip install https://github.com/Panniantong/agent-reach/archive/main.zip
          agent-reach install --env=auto

      - name: Execute command and save output
        run: |
          echo "تنفيذ: ${{ github.event.inputs.query }}"
          echo "==================== النتائج ===================="
          bash -c "${{ github.event.inputs.query }}" > results.txt 2>&1
          cat results.txt  # لعرض النتيجة في الـ logs

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: results
          path: results.txt
