name: Agent Reach - YouTube Search with yt-dlp
on:
  workflow_dispatch:
    inputs:
      query:
        description: 'كلمة البحث (مثل: تعلم بايثون)'
        required: true
        default: 'برمجة'
      limit:
        description: 'عدد النتائج (1-50)'
        required: false
        default: '10'

jobs:
  search:
    runs-on: ubuntu-latest
    steps:
      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y python3 python3-pip git curl wget ffmpeg

      - name: Install yt-dlp
        run: |
          pip install yt-dlp

      - name: Search YouTube and save results
        run: |
          echo "🔍 البحث عن: ${{ github.event.inputs.query }}"
          echo "📊 عدد النتائج: ${{ github.event.inputs.limit }}"
          echo "==================== النتائج ===================="
          yt-dlp "ytsearch${{ github.event.inputs.limit }}:${{ github.event.inputs.query }}" \
            --skip-download \
            --print "%(title)s | %(uploader)s | %(view_count)s | %(duration)s" \
            --no-warnings \
            --quiet \
            2>&1 | tee results.txt
          echo "✅ تم حفظ النتائج في results.txt"

      - name: Upload results as text
        uses: actions/upload-artifact@v4
        with:
          name: youtube-results
          path: results.txt
          retention-days: 7
